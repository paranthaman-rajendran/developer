/*
 * This file was generated by the Gradle 'init' task.
 *
 * This generated file contains a sample Java application project to get you started.
 * For more details on building Java & JVM projects, please refer to https://docs.gradle.org/8.5/userguide/building_java_projects.html in the Gradle documentation.
 */

plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    // Add the WAR plugin so we can produce a web archive for Tomcat deployment.
    id 'war'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

// Define providedCompile configuration for dependencies provided by the servlet container at runtime.
configurations {
    providedCompile
}

sourceSets {
    main {
        compileClasspath += configurations.providedCompile
    }
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava

    // Servlet API - provided by Tomcat at runtime, but needed for compilation and IDE.
    // Using implementation so IDE resolves types; it won't be bundled in the WAR due to 'provided' config.
    providedCompile 'javax.servlet:javax.servlet-api:4.0.1'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(8)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'com.learn.sso.customer.App'
    // Set default JVM system property so `gradle run` and the `run` task will start with the desired port.
    // Note: WAR deployed to Tomcat will use the Tomcat server's port (Tomcat config), this only affects `gradle run`.
    applicationDefaultJvmArgs = ['-Dserver.port=8081']
}

// Configure the WAR output for deployment to Tomcat.
war {
    // Set a stable name for the generated WAR file.
    archiveFileName.set('user-management.war')
    // Ensure it lands in the standard libs directory under build.
    destinationDirectory.set(layout.buildDirectory.dir('libs'))
}

// Ensure the `run` task also receives the same jvm arg (covers direct task runs).
tasks.named('run') {
    jvmArgs = ['-Dserver.port=8081']
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}
